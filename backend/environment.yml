name: ecommerce-ai-cs
channels:
  - pytorch
  - defaults
  - conda-forge
dependencies:
  - python=3.10
  - pytorch>=2.4.0
  - torchvision
  - torchaudio
  - pip
  - pip:
      - fastapi
      - uvicorn
      - langchain
      - langchain-core
      - langchain-community
      - langgraph
      - langchain-openai
      - chromadb
      - sentence-transformers
      - pymysql
      - psycopg2-binary  # 预留给 PostgreSQL 的高并发架构
      - redis            # 预留给 Redis 缓存或状态管理
      - sqlalchemy
      - python-dotenv
      - pydantic
      - cryptography
      - numpy<2.0.0
      - pytest
      - pytest-asyncio
